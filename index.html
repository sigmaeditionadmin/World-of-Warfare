<!DOCTYPE html>
<html>
<head>
<title>Iron Crown</title>
<style>
body{
  margin:0;
  background:#0f0f0f;
  overflow:hidden;
  font-family:sans-serif;
  color:white;
}

#log{
  position:absolute;
  right:0;
  top:0;
  width:260px;
  height:60%;
  overflow-y:auto;
  background:#1c1c1c;
  padding:10px;
  box-sizing:border-box;
  border-left:3px solid #333;
}

#stats{
  position:absolute;
  right:0;
  bottom:0;
  width:260px;
  height:40%;
  background:#181818;
  padding:15px;
  box-sizing:border-box;
  border-left:3px solid #333;
  border-top:3px solid #333;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="log"></div>
<div id="stats">Click a kingdom</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth - 260;
canvas.height = window.innerHeight;

const logDiv = document.getElementById("log");
const statsDiv = document.getElementById("stats");

let arrows = [];

function log(msg){
  logDiv.innerHTML += msg + "<br>";
  logDiv.scrollTop = logDiv.scrollHeight;
}

const kingdoms = [
  {name:"Aldor", x:220, y:200, troops:55, owner:"player"},
  {name:"Bram", x:520, y:160, troops:30, owner:"enemy"},
  {name:"Cairn", x:450, y:420, troops:40, owner:"enemy"},
  {name:"Dorne", x:170, y:480, troops:35, owner:"enemy"}
];

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let k of kingdoms){

    ctx.beginPath();
    ctx.arc(k.x,k.y,35,0,Math.PI*2);

    if(k.owner==="player") ctx.fillStyle="#1db954";   // bright green
    else if(k.owner==="enemy") ctx.fillStyle="#555";  // darker gray
    else ctx.fillStyle="#3498db";                     // blue ally

    ctx.fill();

    ctx.strokeStyle="#000";
    ctx.lineWidth=3;
    ctx.stroke();

    // troops number
    ctx.fillStyle="white";
    ctx.font="bold 16px sans-serif";
    ctx.textAlign="center";
    ctx.fillText(k.troops,k.x,k.y+5);

    // kingdom name under circle
    ctx.font="14px sans-serif";
    ctx.fillStyle="#ccc";
    ctx.fillText(k.name,k.x,k.y+55);
  }

  drawArrows();
}

function drawArrows(){
  for(let a of arrows){

    ctx.strokeStyle = a.type==="ai" ? "orange" : "white";
    ctx.lineWidth=4;

    ctx.beginPath();
    ctx.moveTo(a.from.x,a.from.y);
    ctx.lineTo(a.to.x,a.to.y);
    ctx.stroke();

    // arrowhead
    const angle = Math.atan2(a.to.y-a.from.y, a.to.x-a.from.x);
    const size = 14;

    ctx.beginPath();
    ctx.moveTo(a.to.x, a.to.y);
    ctx.lineTo(
      a.to.x - size * Math.cos(angle - Math.PI/6),
      a.to.y - size * Math.sin(angle - Math.PI/6)
    );
    ctx.lineTo(
      a.to.x - size * Math.cos(angle + Math.PI/6),
      a.to.y - size * Math.sin(angle + Math.PI/6)
    );
    ctx.closePath();
    ctx.fillStyle = a.type==="ai" ? "orange" : "white";
    ctx.fill();
  }
}

function updateStats(k){
  statsDiv.innerHTML = `
    <h2>${k.name}</h2>
    <hr>
    <b>Owner:</b> ${k.owner}<br>
    <b>Troops:</b> ${k.troops}
  `;
}

canvas.addEventListener("click", function(e){
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  for(let k of kingdoms){
    if(Math.hypot(mx-k.x,my-k.y)<35){

      updateStats(k);

      if(k.owner!=="player"){
        playerAttack(k);
      }
      break;
    }
  }
});

function playerAttack(target){
  const attacker = kingdoms.find(k=>k.owner==="player");
  if(!attacker || attacker.troops<=1) return;

  arrows.push({from:attacker,to:target,type:"player"});

  setTimeout(()=>{
    resolveBattle(attacker,target);
    arrows.shift();
    draw();
    aiTurn();
  },1500);
}

function aiTurn(){
  const aiKingdoms = kingdoms.filter(k=>k.owner==="enemy");
  let attacks = 0;

  function nextAttack(){
    if(attacks>=2) return;

    const attacker = aiKingdoms[Math.floor(Math.random()*aiKingdoms.length)];
    const targets = kingdoms.filter(k=>k!==attacker && k.troops>0);

    if(targets.length===0) return;

    const target = targets[Math.floor(Math.random()*targets.length)];

    arrows.push({from:attacker,to:target,type:"ai"});

    setTimeout(()=>{
      resolveBattle(attacker,target);
      arrows.shift();
      draw();
      attacks++;
      nextAttack();
    },1500);
  }

  nextAttack();
}

function resolveBattle(attacker,target){
  if(attacker.troops<=0 || target.troops<=0) return;

  const winChance = attacker.troops/(attacker.troops+target.troops);

  if(Math.random()<winChance){
    const damage = Math.floor(attacker.troops*0.5);
    target.troops -= damage;
    attacker.troops -= Math.floor(target.troops*0.3);

    if(target.troops<=0){
      target.owner = attacker.owner;
      target.troops = Math.max(5, Math.floor(attacker.troops*0.5));
      log(attacker.name+" conquered "+target.name);
    } else {
      log(attacker.name+" hit "+target.name);
    }
  } else {
    attacker.troops -= Math.floor(target.troops*0.4);
    log(attacker.name+" failed attacking "+target.name);
  }

  if(attacker.troops<0) attacker.troops=0;
  if(target.troops<0) target.troops=0;
}

function gameLoop(){
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
