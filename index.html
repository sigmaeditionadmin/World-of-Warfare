<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Crown 👑 - Color Blind Friendly Arrows</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
  }
  #battleLog {
    width: 250px;
    background-color: #1e1e1e;
    color: #fff;
    padding: 10px;
    overflow-y: auto;
    box-sizing: border-box;
  }
  #gameContainer {
    flex-grow: 1;
    position: relative;
    background-color: #3CB371;
    overflow: hidden;
  }
  #statsBar {
    width: 250px;
    background-color: #333;
    color: #fff;
    padding: 10px;
    box-sizing: border-box;
  }
  canvas {
    position: absolute;
    left: 0;
    top: 0;
  }
  .kingdom {
    width: 50px;
    height: 50px;
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    border: 2px solid #000;
    border-radius: 10px;
    font-size: 20px;
    text-shadow: 1px 1px 2px #000;
    box-shadow: 0 0 5px rgba(0,0,0,0.5);
  }
  .player { background-color: yellow; color: #000; }
  .ally { background-color: blue; color: #fff; }
  .enemy { background-color: red; color: #fff; }
  .retreated { background-color: grey; color: #fff; }
  .actionButton {
    position: absolute;
    padding: 5px 10px;
    background-color: #fff;
    border: 1px solid #000;
    cursor: pointer;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="battleLog"><h3>Battle Log</h3></div>
<div id="gameContainer">
  <canvas id="arrowCanvas"></canvas>
</div>
<div id="statsBar"><h3>Stats</h3><div id="statsContent"></div></div>

<script>
const battleLog = document.getElementById('battleLog');
const gameContainer = document.getElementById('gameContainer');
const arrowCanvas = document.getElementById('arrowCanvas');
const statsContent = document.getElementById('statsContent');
const ctx = arrowCanvas.getContext('2d');

let containerWidth = window.innerWidth - 500;
let containerHeight = window.innerHeight;
arrowCanvas.width = containerWidth;
arrowCanvas.height = containerHeight;

window.addEventListener('resize', () => {
  containerWidth = window.innerWidth - 500;
  containerHeight = window.innerHeight;
  arrowCanvas.width = containerWidth;
  arrowCanvas.height = containerHeight;
  renderKingdoms();
});

function getRandomInt(min,max){return Math.floor(Math.random()*(max-min+1)+min);}
function log(message){
  const p = document.createElement('p');
  p.textContent = message;
  battleLog.appendChild(p);
  battleLog.scrollTop = battleLog.scrollHeight;
}

let kingdoms = [];
let currentTurn = 'player';
let attacksThisTurn = 0;
let maxAlliances = 2;
let allianceRequested = false;
let arrows = [];

function placeKingdom(occupied){
  let x,y,valid=false;
  while(!valid){
    x = getRandomInt(50, containerWidth - 50);
    y = getRandomInt(50, containerHeight - 50);
    valid = true;
    for(let k of occupied){
      if(Math.hypot(k.x-x,k.y-y)<60){ valid=false; break; }
    }
  }
  return {x,y};
}

for(let i=1;i<=12;i++){
  let owner = i===1 ? 'player' : 'enemy';
  let pos = placeKingdom(kingdoms);
  kingdoms.push({
    id: i,
    x: pos.x,
    y: pos.y,
    owner: owner,
    troops: getRandomInt(30,48),
    alliances: 0
  });
}

// Draw arrows with >/< style arrowheads
function drawArrows(){
  ctx.clearRect(0,0,arrowCanvas.width,arrowCanvas.height);
  arrows.forEach(a=>{
    // Main line
    ctx.beginPath();
    ctx.moveTo(a.fromX+25, a.fromY+25);
    ctx.lineTo(a.toX+25, a.toY+25);
    ctx.strokeStyle = a.type==='ai' ? 'orange' : 'white';
    ctx.lineWidth = 3;
    ctx.stroke();

    let angle = Math.atan2(a.toY - a.fromY, a.toX - a.fromX);
    let headlen = 10;

    // Left side
    ctx.beginPath();
    ctx.moveTo(a.toX+25, a.toY+25);
    ctx.lineTo(a.toX+25 - headlen * Math.cos(angle - Math.PI/6), 
               a.toY+25 - headlen * Math.sin(angle - Math.PI/6));
    ctx.strokeStyle = a.type==='ai' ? 'orange' : 'white';
    ctx.stroke();

    // Right side
    ctx.beginPath();
    ctx.moveTo(a.toX+25, a.toY+25);
    ctx.lineTo(a.toX+25 - headlen * Math.cos(angle + Math.PI/6), 
               a.toY+25 - headlen * Math.sin(angle + Math.PI/6));
    ctx.strokeStyle = a.type==='ai' ? 'orange' : 'white';
    ctx.stroke();
  });
}

function updateStats(){
  let playerTroops = kingdoms.filter(k=>k.owner==='player').reduce((a,k)=>a+k.troops,0);
  let allyTroops = kingdoms.filter(k=>k.owner==='ally').reduce((a,k)=>a+k.troops,0);
  let enemyTroops = kingdoms.filter(k=>k.owner==='enemy').reduce((a,k)=>a+k.troops,0);
  let totalPlayer = kingdoms.filter(k=>k.owner==='player').length;
  let totalAllies = kingdoms.filter(k=>k.owner==='ally').length;
  let totalEnemies = kingdoms.filter(k=>k.owner==='enemy').length;
  statsContent.innerHTML = `
    Player Troops: ${playerTroops} (${totalPlayer} kingdoms)<br>
    Ally Troops: ${allyTroops} (${totalAllies} kingdoms)<br>
    Enemy Troops: ${enemyTroops} (${totalEnemies} kingdoms)
  `;
}

function renderKingdoms(){
  gameContainer.querySelectorAll('.kingdom').forEach(k=>k.remove());
  kingdoms.forEach(k=>{
    const div = document.createElement('div');
    div.className='kingdom';
    if(k.owner==='player') div.classList.add('player');
    else if(k.owner==='ally') div.classList.add('ally');
    else if(k.owner==='enemy') div.classList.add('enemy');
    else if(k.owner==='retreated') div.classList.add('retreated');

    div.style.left = k.x+'px';
    div.style.top = k.y+'px';
    div.innerHTML = k.owner==='retreated' ? '🏰<br>0' : `🏰<br>${k.troops}`;
    div.addEventListener('click', ()=>selectKingdom(k,div));
    gameContainer.appendChild(div);
  });
  drawArrows();
  updateStats();
}

function selectKingdom(k,element){
  document.querySelectorAll('.actionButton').forEach(b=>b.remove());
  if(currentTurn!=='player') return;

  if(k.owner==='player'||k.owner==='ally'){
    if(k.owner!=='retreated' && k.id!==1){
      const retreatBtn = document.createElement('button');
      retreatBtn.className='actionButton';
      retreatBtn.style.left = k.x+'px';
      retreatBtn.style.top = (k.y-60)+'px';
      retreatBtn.textContent='Retreat Home';
      retreatBtn.onclick = ()=>retreatKingdom(k);
      gameContainer.appendChild(retreatBtn);
    }
    return;
  }

  if(!allianceRequested && kingdoms.filter(kk=>kk.owner==='ally').length<maxAlliances){
    const allianceBtn = document.createElement('button');
    allianceBtn.className='actionButton';
    allianceBtn.style.left = k.x+'px';
    allianceBtn.style.top = (k.y-30)+'px';
    allianceBtn.textContent='Alliance';
    allianceBtn.onclick = ()=>requestAlliance(k);
    gameContainer.appendChild(allianceBtn);
  }

  const attackBtn=document.createElement('button');
  attackBtn.className='actionButton';
  attackBtn.style.left = k.x+'px';
  attackBtn.style.top = (k.y-60)+'px';
  attackBtn.textContent='Attack';
  attackBtn.onclick = ()=>attackKingdom(k);
  gameContainer.appendChild(attackBtn);
}

function retreatKingdom(k){
  const home = kingdoms.find(h => h.id === 1);
  home.troops += k.troops;
  k.troops = 0;
  k.owner = 'retreated';
  log(`Kingdom ${k.id} retreated. Troops added to home kingdom ${home.id}.`);
  renderKingdoms();
}

function requestAlliance(k){
  allianceRequested = true;
  const success = Math.random() < 0.5;
  if(success){ k.owner='ally'; log(`Alliance successful with kingdom ${k.id}`); }
  else log(`Alliance request denied for kingdom ${k.id}`);
  renderKingdoms();
}

function attackKingdom(k){
  const attackers = kingdoms.filter(kk=>kk.owner==='player'||kk.owner==='ally');
  const fromKingdom = attackers[0];
  arrows.push({fromX:fromKingdom.x, fromY:fromKingdom.y, toX:k.x, toY:k.y, type:'player'});
  drawArrows();
  setTimeout(()=>{ arrows.shift(); drawArrows(); },1500);

  const totalAttackers = attackers.reduce((sum, a)=>sum+a.troops, 0);
  const successChance = totalAttackers / (totalAttackers + k.troops);

  if(Math.random() < successChance){
    k.owner='player';
    k.troops = Math.max(10,getRandomInt(30,48));
    log(`Attack successful! You conquered kingdom ${k.id} (Your troops: ${totalAttackers}, Enemy: ${k.troops})`);
  } else {
    log(`Attack failed on kingdom ${k.id} (Your troops: ${totalAttackers}, Enemy: ${k.troops})`);
  }
  attacksThisTurn++;
  renderKingdoms();
  if(attacksThisTurn>=2) endTurn();
}

function aiTurn(){
  const aiKingdoms = kingdoms.filter(k=>k.owner==='enemy');
  const playerKingdoms = kingdoms.filter(k=>k.owner==='player');
  if(aiKingdoms.length===0 || playerKingdoms.length===0) return;

  const attacker = aiKingdoms[getRandomInt(0, aiKingdoms.length-1)];
  const target = playerKingdoms[getRandomInt(0, playerKingdoms.length-1)];

  arrows.push({fromX: attacker.x, fromY: attacker.y, toX: target.x, toY: target.y, type:'ai'});
  drawArrows();
  setTimeout(()=>{ arrows.shift(); drawArrows(); },1500);

  const successChance = attacker.troops / (attacker.troops + target.troops);

  if(Math.random() < successChance){
    target.owner='enemy';
    log(`AI conquered your kingdom ${target.id} (AI troops: ${attacker.troops}, Your troops: ${target.troops})`);
  } else {
    log(`AI attack failed on your kingdom ${target.id} (AI troops: ${attacker.troops}, Your troops: ${target.troops})`);
  }
}

function endTurn(){
  attacksThisTurn=0;
  allianceRequested=false;
  currentTurn=currentTurn==='player'?'ai':'player';
  log(`Turn ended. Now it's ${currentTurn}'s turn.`);
  if(currentTurn==='ai'){ 
    aiTurn(); 
    currentTurn='player'; 
    log('Your turn.');
    renderKingdoms(); 
  }
}

renderKingdoms();
</script>
</body>
</html>
