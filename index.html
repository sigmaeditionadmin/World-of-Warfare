<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iron Crown 👑</title>
<style>
body { margin:0; font-family:Arial; display:flex; height:100vh; }
#battleLog { width:250px; background:#1e1e1e; color:#fff; padding:10px; overflow-y:auto; }
#gameContainer { flex-grow:1; position:relative; background:#3CB371; overflow:hidden; }
#statsBar { width:250px; background:#333; color:#fff; padding:10px; }
canvas { position:absolute; left:0; top:0; z-index:0; }

.kingdom {
  width:50px; height:50px; position:absolute;
  display:flex; align-items:center; justify-content:center;
  font-weight:bold; cursor:pointer;
  border:2px solid black; border-radius:10px;
  z-index:1; text-align:center;
}

.player { background:#32CD32; }
.enemy { background:red; color:white; }
</style>
</head>
<body>

<div id="battleLog"><h3>Battle Log</h3></div>
<div id="gameContainer"><canvas id="arrowCanvas"></canvas></div>
<div id="statsBar">
<h3>Stats</h3>
<div id="statsContent">Click a kingdom</div>
<button onclick="initializeGame()">Reset Game</button>
</div>

<script>
const battleLog = document.getElementById('battleLog');
const gameContainer = document.getElementById('gameContainer');
const arrowCanvas = document.getElementById('arrowCanvas');
const statsContent = document.getElementById('statsContent');
const ctx = arrowCanvas.getContext('2d');

arrowCanvas.width = window.innerWidth - 500;
arrowCanvas.height = window.innerHeight;

function log(msg){
  let p=document.createElement('p');
  p.textContent=msg;
  battleLog.appendChild(p);
  battleLog.scrollTop=battleLog.scrollHeight;
}

function rand(min,max){return Math.floor(Math.random()*(max-min+1)+min);}

let kingdoms=[], selectedKingdoms=[], arrows=[];
let attacksThisTurn=0;

function initializeGame(){
  kingdoms=[]; selectedKingdoms=[]; arrows=[];
  attacksThisTurn=0;
  for(let i=1;i<=12;i++){
    kingdoms.push({
      id:i,
      x:rand(60,arrowCanvas.width-60),
      y:rand(60,arrowCanvas.height-60),
      owner:i===1?'player':'enemy',
      troops:rand(30,48)
    });
  }
  battleLog.innerHTML="<h3>Battle Log</h3>";
  log("Game Reset. Your turn.");
  render();
}

function render(){
  gameContainer.querySelectorAll('.kingdom').forEach(k=>k.remove());

  kingdoms.forEach(k=>{
    let div=document.createElement('div');
    div.className='kingdom '+k.owner;
    div.style.left=k.x+'px';
    div.style.top=k.y+'px';
    div.innerHTML=`🏰<br>${k.troops}`;

    if(selectedKingdoms.includes(k))
      div.style.outline="3px solid yellow";

    div.onclick=()=>selectKingdom(k);
    gameContainer.appendChild(div);
  });
}

function selectKingdom(k){
  statsContent.innerHTML=`Kingdom ${k.id}<br>Owner: ${k.owner}<br>Troops: ${k.troops}`;

  if(k.owner==='player'){
    if(selectedKingdoms.includes(k)){
      selectedKingdoms=selectedKingdoms.filter(x=>x!==k);
    }else if(selectedKingdoms.length<5){
      selectedKingdoms.push(k);
    }else{
      log("Max 5 kingdoms selected.");
    }
    render();
    return;
  }

  if(selectedKingdoms.length>0){
    combinedAttack(k);
    selectedKingdoms=[];
    render();
  }
}

function combinedAttack(target){

  let totalTroops = 0;
  selectedKingdoms.forEach(k=>{
    totalTroops += k.troops;
    addArrow(k.x,k.y,target.x,target.y);
  });

  let defenderTroops = target.troops;
  if(totalTroops === 0) return;

  let troopScore = totalTroops/(totalTroops+defenderTroops);
  let finalScore = (troopScore*0.8) + (Math.random()*0.2);

  if(finalScore > 0.5){
    let attackerLoss = Math.floor(totalTroops * 0.4);

    selectedKingdoms.forEach(k=>{
      let proportion = k.troops / totalTroops;
      let loss = Math.floor(attackerLoss * proportion);
      k.troops = Math.max(1, k.troops - loss);
    });

    let survivors = totalTroops - attackerLoss;

    target.owner='player';
    target.troops=Math.max(10, Math.floor(survivors*0.6));

    log(`🔥 Victory! Conquered kingdom ${target.id}`);
  } else {
    let attackerLoss = Math.floor(totalTroops * 0.6);
    let defenderLoss = Math.floor(defenderTroops * 0.3);

    selectedKingdoms.forEach(k=>{
      let proportion = k.troops / totalTroops;
      let loss = Math.floor(attackerLoss * proportion);
      k.troops = Math.max(1, k.troops - loss);
    });

    target.troops=Math.max(5, defenderTroops - defenderLoss);

    log(`❌ Defeat at kingdom ${target.id}`);
  }

  attacksThisTurn++;
  if(attacksThisTurn>=2) endTurn();
}

function addArrow(x1,y1,x2,y2){
  arrows.push({x1,y1,x2,y2,time:Date.now()});
}

function drawArrows(){
  ctx.clearRect(0,0,arrowCanvas.width,arrowCanvas.height);
  let now=Date.now();
  arrows=arrows.filter(a=>now-a.time<1500);

  arrows.forEach(a=>{
    let dx=a.x2-a.x1, dy=a.y2-a.y1;
    let dist=Math.hypot(dx,dy);
    let ratio=(dist-25)/dist;
    let ex=a.x1+dx*ratio+25;
    let ey=a.y1+dy*ratio+25;

    ctx.beginPath();
    ctx.moveTo(a.x1+25,a.y1+25);
    ctx.lineTo(ex,ey);
    ctx.strokeStyle='white';
    ctx.lineWidth=3;
    ctx.stroke();
  });
}

function aiTurn(){
  let ai=kingdoms.filter(k=>k.owner==='enemy');
  let player=kingdoms.filter(k=>k.owner==='player');
  if(ai.length===0||player.length===0)return;

  let attacker=ai[rand(0,ai.length-1)];
  let target=player[rand(0,player.length-1)];

  addArrow(attacker.x,attacker.y,target.x,target.y);

  let troopScore=attacker.troops/(attacker.troops+target.troops);
  let finalScore=(troopScore*0.8)+(Math.random()*0.2);

  if(finalScore>0.5){
    target.owner='enemy';
    target.troops=Math.max(5, Math.floor(attacker.troops*0.6));
    attacker.troops=Math.max(1, Math.floor(attacker.troops*0.6));
    log(`AI conquered kingdom ${target.id}`);
  }else{
    attacker.troops=Math.max(1, Math.floor(attacker.troops*0.7));
    target.troops=Math.max(1, Math.floor(target.troops*0.8));
    log(`AI failed attack on kingdom ${target.id}`);
  }
}

function endTurn(){
  attacksThisTurn=0;
  log("AI Turn...");
  aiTurn();
  log("Your Turn.");
  render();
}

function loop(){
  drawArrows();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

initializeGame();
</script>
</body>
</html>
