<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World of Warfare – Global Conflict</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
display:flex;
height:100vh;
font-family:Arial;
overflow:hidden;
}

#map{
flex:1;
}

#panel{
width:320px;
background:#111;
color:white;
display:flex;
flex-direction:column;
}

#tabs{
display:flex;
background:#222;
}

.tab{
flex:1;
padding:10px;
text-align:center;
cursor:pointer;
border-right:1px solid #333;
}

.tab.active{
background:#444;
}

#panelContent{
flex:1;
overflow-y:auto;
padding:10px;
}

.section{
margin-bottom:20px;
}

input{
width:60px;
}

button{
margin-top:5px;
cursor:pointer;
}

#log{
background:#000;
padding:5px;
height:150px;
overflow-y:auto;
font-size:12px;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="panel">

<div id="tabs">
<div class="tab active" onclick="openTab('units')">Units</div>
<div class="tab" onclick="openTab('missiles')">Missiles</div>
<div class="tab" onclick="openTab('nukes')">Nukes</div>
</div>

<div id="panelContent">

<div id="unitsTab" class="section">

<h3>Send Troops</h3>
Amount: <input id="troopAmount" type="number" value="10"><br>
<button onclick="sendUnits('troops')">Send</button>

<h3>Send Planes ✈️</h3>
Amount: <input id="planeAmount" type="number" value="5"><br>
<button onclick="sendUnits('planes')">Send</button>

<h3>Send Ships 🚢</h3>
Amount: <input id="shipAmount" type="number" value="5"><br>
<button onclick="sendUnits('ships')">Send</button>

</div>

<div id="missilesTab" class="section" style="display:none">

<h3>Launch Missile 🚀</h3>
Damage: 20<br>
<button onclick="launchMissile()">Launch</button>

</div>

<div id="nukesTab" class="section" style="display:none">

<h3>Launch Nuke ☢️</h3>
Massive damage<br>
<button onclick="launchNuke()">Launch</button>

</div>

<h3>Battle Log</h3>
<div id="log"></div>

</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:6
}).addTo(map);

let selectedOrigin=null;
let selectedTarget=null;

let log=document.getElementById("log");

function addLog(text){
log.innerHTML+="<div>"+text+"</div>";
log.scrollTop=log.scrollHeight;
}

map.on("click",function(e){

if(!selectedOrigin){
selectedOrigin=e.latlng;
addLog("Origin selected");
}
else{
selectedTarget=e.latlng;
addLog("Target selected");
}

});

function openTab(name){

document.getElementById("unitsTab").style.display="none";
document.getElementById("missilesTab").style.display="none";
document.getElementById("nukesTab").style.display="none";

document.getElementById(name+"Tab").style.display="block";

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

}

function sendUnits(type){

if(!selectedOrigin||!selectedTarget){
addLog("Select origin and target");
return;
}

let amount=0;

if(type==="troops") amount=document.getElementById("troopAmount").value;
if(type==="planes") amount=document.getElementById("planeAmount").value;
if(type==="ships") amount=document.getElementById("shipAmount").value;

if(type==="ships"){

if(isLand(selectedOrigin)||isLand(selectedTarget)){
addLog("Ships must start and end in water!");
return;
}

}

animateAttack(type,amount);

selectedOrigin=null;
selectedTarget=null;

}

function animateAttack(type,amount){

let icon="⚔️";

if(type==="planes") icon="✈️";
if(type==="ships") icon="🚢";

let marker=L.marker(selectedOrigin,{
icon:L.divIcon({
html:icon,
className:"",
iconSize:[20,20]
})
}).addTo(map);

let steps=60;
let i=0;

let latStep=(selectedTarget.lat-selectedOrigin.lat)/steps;
let lngStep=(selectedTarget.lng-selectedOrigin.lng)/steps;

let move=setInterval(()=>{

i++;

let lat=selectedOrigin.lat+latStep*i;
let lng=selectedOrigin.lng+lngStep*i;

if(type==="ships" && isLand({lat:lat,lng:lng})){
addLog("Ship reached shore");
clearInterval(move);
return;
}

marker.setLatLng([lat,lng]);

if(i>=steps){

clearInterval(move);

marker.remove();

addLog(type+" attacked with "+amount);

}

},50);

}

function launchMissile(){

if(!selectedTarget){
addLog("Select target");
return;
}

L.marker(selectedTarget,{
icon:L.divIcon({
html:"🚀",
className:"",
iconSize:[20,20]
})
}).addTo(map);

addLog("Missile launched!");

selectedTarget=null;

}

function launchNuke(){

if(!selectedTarget){
addLog("Select target");
return;
}

L.circle(selectedTarget,{
radius:500000,
color:"red"
}).addTo(map);

addLog("NUKE DETONATED ☢️");

selectedTarget=null;

}

function isLand(coord){

if(coord.lat>60 || coord.lat<-60) return true;

return false;

}

</script>

</body>
</html>
