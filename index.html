<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Jet Fighter Simulator</title>

<style>
body{margin:0;overflow:hidden;background:#87CEEB;}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
background:rgba(0,0,0,0.4);
padding:8px;
border-radius:6px;
}
</style>

</head>
<body>

<div id="hud">Speed: 0 | Altitude: 0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.157/build/three.min.js"></script>

<script>

let scene,camera,renderer
let plane
let velocity=0
let pitch=0
let roll=0
let keys={}
let clock=new THREE.Clock()

init()
animate()

function init(){

scene=new THREE.Scene()
scene.background=new THREE.Color(0x87CEEB)

camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
)

renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const ambient=new THREE.AmbientLight(0xffffff,0.7)
scene.add(ambient)

const sun=new THREE.DirectionalLight(0xffffff,0.9)
sun.position.set(100,200,100)
scene.add(sun)

createJet()

// ground
const groundGeo=new THREE.PlaneGeometry(6000,6000)
const groundMat=new THREE.MeshStandardMaterial({color:0x2e8b57})
const ground=new THREE.Mesh(groundGeo,groundMat)
ground.rotation.x=-Math.PI/2
scene.add(ground)

window.addEventListener("keydown",e=>keys[e.code]=true)
window.addEventListener("keyup",e=>keys[e.code]=false)

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)
})

}

function createJet(){

plane=new THREE.Group()

// fuselage
const body=new THREE.Mesh(
new THREE.CylinderGeometry(.5,.5,8,20),
new THREE.MeshStandardMaterial({color:0xcccccc})
)
body.rotation.z=Math.PI/2
plane.add(body)

// nose
const nose=new THREE.Mesh(
new THREE.ConeGeometry(.5,2,20),
new THREE.MeshStandardMaterial({color:0x333333})
)
nose.rotation.z=-Math.PI/2
nose.position.x=5
plane.add(nose)

// wings
const wingShape=new THREE.Shape()
wingShape.moveTo(0,0)
wingShape.lineTo(4,1)
wingShape.lineTo(4,-1)
wingShape.lineTo(0,0)

const wingGeo=new THREE.ExtrudeGeometry(wingShape,{depth:.2,bevelEnabled:false})

const wing1=new THREE.Mesh(wingGeo,new THREE.MeshStandardMaterial({color:0x999999}))
wing1.position.set(0,0,0)
wing1.rotation.y=Math.PI/2
plane.add(wing1)

const wing2=wing1.clone()
wing2.rotation.y=-Math.PI/2
plane.add(wing2)

// tail wings
const tailWing=new THREE.Mesh(
new THREE.BoxGeometry(2,.1,.7),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
)
tailWing.position.x=-3
plane.add(tailWing)

// vertical tail
const vTail=new THREE.Mesh(
new THREE.BoxGeometry(.2,1.5,1),
new THREE.MeshStandardMaterial({color:0x888888})
)
vTail.position.set(-3,.8,0)
plane.add(vTail)

// cockpit
const cockpit=new THREE.Mesh(
new THREE.SphereGeometry(.6,20,20),
new THREE.MeshStandardMaterial({color:0x111111})
)
cockpit.scale.set(1,.5,1)
cockpit.position.set(2,.5,0)
plane.add(cockpit)

plane.position.y=10
scene.add(plane)

}

function animate(){

requestAnimationFrame(animate)

let delta=clock.getDelta()

handleControls(delta)
updateCamera()
updateHUD()

renderer.render(scene,camera)

}

function handleControls(delta){

const accel=40
const rotSpeed=1.6

if(keys["KeyW"]) velocity+=accel*delta
if(keys["KeyS"]) velocity-=accel*delta

velocity=Math.max(0,velocity)

if(keys["ArrowUp"]) pitch+=rotSpeed*delta
if(keys["ArrowDown"]) pitch-=rotSpeed*delta

if(keys["KeyA"]) roll+=rotSpeed*delta
if(keys["KeyD"]) roll-=rotSpeed*delta

plane.rotation.z=roll
plane.rotation.x=pitch

let forward=new THREE.Vector3(1,0,0)
forward.applyEuler(plane.rotation)

plane.position.add(forward.multiplyScalar(velocity*delta))

}

function updateCamera(){

let offset=new THREE.Vector3(-25,10,0)
offset.applyEuler(plane.rotation)

camera.position.copy(plane.position).add(offset)

let look=new THREE.Vector3(20,0,0)
look.applyEuler(plane.rotation)
look.add(plane.position)

camera.lookAt(look)

}

function updateHUD(){

document.getElementById("hud").innerText=
`Speed: ${velocity.toFixed(1)} | Altitude: ${plane.position.y.toFixed(1)}`

}

</script>

</body>
</html>
