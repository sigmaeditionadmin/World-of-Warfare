<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Modern Warfare – Global Conflict</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1b1f24;
    color: white;
}

#gameContainer {
    display: flex;
    height: 100vh;
}

#map {
    flex: 3;
}

#sidePanel {
    flex: 1;
    background: #111;
    padding: 15px;
    border-left: 2px solid #333;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    height: 100%;
}

select, input {
    width: 100%;
    margin-bottom: 8px;
    padding: 5px;
    background: #222;
    color: white;
    border: 1px solid #444;
}

button {
    width: 100%;
    padding: 8px;
    background: #2c3e50;
    border: none;
    color: white;
    cursor: pointer;
    margin-bottom: 10px;
}

button:hover {
    background: #34495e;
}

#statsPanel {
    background: #0c0c0c;
    padding: 10px;
    font-size: 13px;
    border: 1px solid #333;
    margin-bottom: 15px;
    flex-shrink: 0;
    max-height: unset;
    overflow: unset;
}

#log {
    background: black;
    padding: 8px;
    font-size: 12px;
    height: auto;
    overflow: unset;
    border: 1px solid #333;
}
</style>
</head>
<body>

<div id="gameContainer">

<div id="map"></div>

<div id="sidePanel">

    <h2>Attack Control Panel</h2>

    <label>Attacking Country</label>
    <select id="attackerSelect"></select>

    <label>Target Country</label>
    <select id="targetSelect"></select>

    <label>Infantry to Send</label>
    <input type="number" id="infantrySend" value="10000">

    <label>Tanks to Send</label>
    <input type="number" id="tankSend" value="500">

    <label>Planes to Send</label>
    <input type="number" id="planeSend" value="200">

    <label>Ships to Send</label>
    <input type="number" id="shipSend" value="50">

    <button onclick="launchAttack()">Launch Attack</button>

    <h3>📊 Global Stats</h3>
    <div id="statsPanel"></div>

    <h3>Battle Log</h3>
    <div id="log"></div>

</div>
</div>

<script>
let map = L.map('map').setView([20,0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let countries = {
    "United States of America": { owner: "player", infantry: 130000, tanks: 6000, planes: 800, ships: 200, coords:[38,-97] },
    "Russia": { owner: "ai", infantry: 115000, tanks: 5000, planes: 700, ships: 150, coords:[60,100] },
    "China": { owner: "ai", infantry: 200000, tanks: 5500, planes: 900, ships: 180, coords:[35,105] },
    "Iran": { owner: "ai", infantry: 57000, tanks: 1600, planes: 200, ships: 50, coords:[32,53] },
    "North Korea": { owner: "ai", infantry: 120000, tanks: 4000, planes: 300, ships: 30, coords:[40,127] }
};

let geoLayer;

function getColor(owner) { return owner === "player" ? "green" : "red"; }

function log(msg) {
    let box = document.getElementById("log");
    box.innerHTML += msg + "<br>";
    box.scrollTop = box.scrollHeight;
}

function style(feature) {
    let name = feature.properties.name_en || feature.properties.name;
    if (countries[name]) {
        return { fillColor: getColor(countries[name].owner), weight: 1, color: "black", fillOpacity: 0.6 };
    }
    return { fillOpacity: 0 };
}

function refreshMap() { if (geoLayer) geoLayer.setStyle(style); }

fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json")
.then(res => res.json())
.then(data => {
    geoLayer = L.geoJSON(data, {
        style: style,
        onEachFeature: function(feature, layer) {
            let name = feature.properties.name_en || feature.properties.name;
            if (countries[name]) { 
                layer.bindPopup(name); 
                layer.on('click', () => {
                    if (countries[name].owner === "player") {
                        document.getElementById("attackerSelect").value = name;
                    } else {
                        document.getElementById("targetSelect").value = name;
                    }
                });
            }
        }
    }).addTo(map);
});

function populateDropdowns() {
    let attackerSel = document.getElementById("attackerSelect");
    let targetSel = document.getElementById("targetSelect");
    attackerSel.innerHTML = "";
    targetSel.innerHTML = "";
    for (let name in countries) {
        if (countries[name].owner === "player") attackerSel.innerHTML += `<option value="${name}">${name}</option>`;
        else targetSel.innerHTML += `<option value="${name}">${name}</option>`;
    }
}

function updateStats() {
    let yourCountries = 0, yourInfantry = 0, yourTanks = 0, yourPlanes = 0, yourShips = 0, aiCountries = 0;
    for (let name in countries) {
        let c = countries[name];
        if (c.owner === "player") {
            yourCountries++;
            yourInfantry += c.infantry;
            yourTanks += c.tanks;
            yourPlanes += c.planes;
            yourShips += c.ships;
        } else aiCountries++;
    }
    let totalPower = yourInfantry + yourTanks*3 + yourPlanes*5 + yourShips*4;
    document.getElementById("statsPanel").innerHTML = `
        <b>Your Countries:</b> ${yourCountries}<br>
        <b>Your Infantry:</b> ${yourInfantry.toLocaleString()}<br>
        <b>Your Tanks:</b> ${yourTanks.toLocaleString()}<br>
        <b>Your Planes:</b> ${yourPlanes.toLocaleString()}<br>
        <b>Your Ships:</b> ${yourShips.toLocaleString()}<br>
        <b>Total Power:</b> ${totalPower.toLocaleString()}<br>
        <b>AI Countries Left:</b> ${aiCountries}
    `;
}

// Animate planes/ships
function animateUnit(fromCoords, toCoords, color, duration=2000) {
    let marker = L.circleMarker(fromCoords, {radius: 6, color: color}).addTo(map);
    let steps = 50;
    let step = 0;
    let latStep = (toCoords[0]-fromCoords[0])/steps;
    let lngStep = (toCoords[1]-fromCoords[1])/steps;
    let interval = setInterval(() => {
        step++;
        marker.setLatLng([fromCoords[0]+latStep*step, fromCoords[1]+lngStep*step]);
        if (step>=steps) {
            clearInterval(interval);
            map.removeLayer(marker);
        }
    }, duration/steps);
}

// General attack function
function resolveAttack(attackerName, targetName, inf, tanks, planes, ships) {
    let attacker = countries[attackerName];
    let defender = countries[targetName];
    if (!attacker || !defender) return;

    attacker.infantry -= inf; attacker.tanks -= tanks; attacker.planes -= planes; attacker.ships -= ships;

    // Animate planes and ships
    for (let i=0;i<planes;i+=50) animateUnit(attacker.coords, defender.coords, 'yellow', 1500);
    for (let i=0;i<ships;i+=10) animateUnit(attacker.coords, defender.coords, 'blue', 2500);

    return new Promise(resolve => {
        setTimeout(() => {
            let attackPower = inf + tanks*3 + planes*5 + ships*4 + Math.random()*50000;
            let defendPower = defender.infantry + defender.tanks*3 + defender.planes*5 + defender.ships*4 + Math.random()*50000;
            if (attackPower > defendPower) {
                log(attackerName + " captured " + targetName);
                defender.owner = attacker.owner;
                defender.infantry = Math.floor(inf/2);
                defender.tanks = Math.floor(tanks/2);
                defender.planes = Math.floor(planes/2);
                defender.ships = Math.floor(ships/2);
            } else {
                log(attackerName + " failed attacking " + targetName);
                defender.infantry -= Math.floor(inf/3);
                defender.tanks -= Math.floor(tanks/3);
                defender.planes -= Math.floor(planes/3);
                defender.ships -= Math.floor(ships/3);
                for (let key of ["infantry","tanks","planes","ships"]) if (defender[key]<0) defender[key]=0;
            }
            populateDropdowns();
            refreshMap();
            updateStats();
            resolve();
        }, 2000);
    });
}

async function launchAttack() {
    let attackerName = document.getElementById("attackerSelect").value;
    let targetName = document.getElementById("targetSelect").value;
    let inf = parseInt(document.getElementById("infantrySend").value);
    let tanks = parseInt(document.getElementById("tankSend").value);
    let planes = parseInt(document.getElementById("planeSend").value);
    let ships = parseInt(document.getElementById("shipSend").value);

    let attacker = countries[attackerName];
    let defender = countries[targetName];
    if (!attacker || !defender) return;

    if (inf > attacker.infantry || tanks > attacker.tanks || planes > attacker.planes || ships > attacker.ships) {
        log("Not enough troops!");
        return;
    }

    await resolveAttack(attackerName, targetName, inf, tanks, planes, ships);

    // AI turn
    for (let aiName in countries) {
        let aiCountry = countries[aiName];
        if (aiCountry.owner === "ai") {
            let possibleTargets = Object.keys(countries).filter(n => n !== aiName);
            let target = possibleTargets[Math.floor(Math.random()*possibleTargets.length)];
            let t = countries[target];
            // Send a portion of troops
            let aiInf = Math.floor(aiCountry.infantry*0.3);
            let aiTanks = Math.floor(aiCountry.tanks*0.3);
            let aiPlanes = Math.floor(aiCountry.planes*0.3);
            let aiShips = Math.floor(aiCountry.ships*0.3);
            await resolveAttack(aiName, target, aiInf, aiTanks, aiPlanes, aiShips);
        }
    }
}

populateDropdowns();
updateStats();
</script>

</body>
</html>
