<!DOCTYPE html>
<html>
<head>
<title>Iron Crown</title>
<style>
body {
    margin:0;
    background:#1a1a1a;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    height:100vh;
}
#log {
    width:250px;
    height:100%;
    overflow-y:auto;
    background:#111;
    padding:10px;
    box-sizing:border-box;
    flex-shrink:0;
}
#main {
    flex-grow:1;
    display:flex;
    flex-direction:column;
}
#map {
    flex-grow:1;
    position:relative;
    background:#2e3b2e;
    margin:5px;
    overflow:hidden;
}
button {
    padding:10px;
    margin:5px;
    font-size:16px;
    cursor:pointer;
}
.kingdom {
    position:absolute;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:12px;
    text-align:center;
    padding:5px;
    border:2px solid black;
}
.player { background:gold; color:black; }
.enemy { background:crimson; }
.action-btns {
    position:absolute;
    display:flex;
    gap:5px;
    top:-40px; /* above kingdom */
    left:0;
}
.action-btns button {
    padding:4px 6px;
    font-size:10px;
}
#turn-info {
    padding:5px;
    font-size:14px;
}
</style>
</head>
<body>

<div id="log">
    <h2>👑 Iron Crown</h2>
    <h3>Battle Log</h3>
</div>

<div id="main">
    <div>
        <button onclick="resetGame()">Reset Game</button>
        <span id="turn-info">Turn: 1 | Alliances used: 0/2</span>
    </div>
    <div id="map"></div>
</div>

<script>
let selectedKingdoms = [];
let turn = 1;
let allianceRequests = 0; // Count alliances used this turn

const map = document.getElementById("map");
const log = document.getElementById("log");
const turnInfo = document.getElementById("turn-info");
let kingdoms = [];
let currentActionButtons = null;

// Generate random map with kingdoms
function generateMap() {
    kingdoms = [];
    for(let i=0;i<12;i++){
        kingdoms.push({
            id:i,
            x:Math.random()*80, 
            y:Math.random()*80,
            troops:30+Math.floor(Math.random()*20),
            owner:i===0?"player":"enemy"
        });
    }
    allianceRequests = 0;
    updateTurnInfo();
}

// Draw kingdoms on the map
function drawMap(){
    map.innerHTML="";
    kingdoms.forEach(k=>{
        const div = document.createElement("div");
        div.className = "kingdom " + k.owner;
        div.style.left = k.x + "%";
        div.style.top = k.y + "%";
        div.innerHTML = "🏰<br>" + k.troops;

        if(selectedKingdoms.includes(k)){
            div.style.boxShadow = "0 0 12px 3px yellow";
        }

        div.onclick = () => handleKingdomClick(k, div);
        map.appendChild(div);
    });
}

// Handle click on a kingdom
function handleKingdomClick(k, div){
    // Remove old buttons
    if(currentActionButtons){
        currentActionButtons.remove();
        currentActionButtons = null;
    }

    if(k.owner==="player"){
        if(selectedKingdoms.includes(k)){
            selectedKingdoms = selectedKingdoms.filter(kk => kk !== k);
            addLog("Deselected kingdom with " + k.troops + " troops.");
        } else {
            selectedKingdoms.push(k);
            addLog("Selected kingdom with " + k.troops + " troops.");
        }
        drawMap();
    }
    else if(k.owner==="enemy" && selectedKingdoms.length > 0){
        // If 2 alliances already requested, force attack
        if(allianceRequests >= 2){
            addLog("⚠ You have used 2 alliances, you must attack!");
            attackSingleTurn(selectedKingdoms, k);
            return;
        }

        // Show action buttons above kingdom
        const btnContainer = document.createElement("div");
        btnContainer.className = "action-btns";

        const attackBtn = document.createElement("button");
        attackBtn.innerText = "Attack";
        attackBtn.onclick = (e)=>{
            e.stopPropagation();
            attackSingleTurn(selectedKingdoms, k);
            btnContainer.remove();
        }

        const allianceBtn = document.createElement("button");
        allianceBtn.innerText = "Alliance";
        allianceBtn.onclick = (e)=>{
            e.stopPropagation();
            requestAlliance(k);
            btnContainer.remove();
        }

        btnContainer.appendChild(attackBtn);
        if(allianceRequests < 2){
            btnContainer.appendChild(allianceBtn);
        }
        div.appendChild(btnContainer);
        currentActionButtons = btnContainer;
    }
}

// Player attacks one enemy, then AI attacks once
function attackSingleTurn(attackerKingdoms, defender){
    let totalAttackPower = 0;
    attackerKingdoms.forEach(attacker => {
        let attackRoll = (Math.random()*0.4 + 0.8);
        totalAttackPower += attacker.troops * attackRoll;
    });

    let defendRoll = (Math.random()*0.4 + 0.8);
    if(defender.troops < totalAttackPower){
        defendRoll += 0.1;
    }
    let defendPower = defender.troops * defendRoll;

    addLog("⚔ Battle! Total Attack: "+totalAttackPower.toFixed(1)+" Enemy: "+defendPower.toFixed(1));

    if(totalAttackPower > defendPower){
        addLog("✅ You conquered the kingdom!");
        attackerKingdoms.forEach(attacker => {
            attacker.troops = Math.floor(attacker.troops * 0.6);
        });
        defender.owner = "player";
        defender.troops = Math.floor(totalAttackPower * 0.5);
    } else {
        addLog("❌ You lost the battle!");
        attackerKingdoms.forEach(attacker => {
            attacker.troops = Math.floor(attacker.troops * 0.5);
        });
    }

    selectedKingdoms = [];
    drawMap();
    checkWin();

    // After player attack, AI attacks once
    enemyTurn();

    // Reset alliances for next turn
    allianceRequests = 0;
    updateTurnInfo();
}

// Player requests alliance with enemy kingdom
function requestAlliance(enemyKingdom){
    allianceRequests++;
    let chance = Math.random();
    if(chance <= 0.25){ // 25% chance success
        enemyKingdom.owner = "player";
        addLog("🤝 Alliance successful! Kingdom joined you.");
    } else {
        addLog("❌ Alliance rejected! You can still act this turn unless you have requested 2 alliances.");
    }

    drawMap();
    updateTurnInfo();
    // Do NOT call enemyTurn here, player can still act
}

// AI attacks once (less powerful)
function enemyTurn(){
    let enemies = kingdoms.filter(k=>k.owner==="enemy");
    let players = kingdoms.filter(k=>k.owner==="player");
    if(enemies.length===0 || players.length===0) return;

    let enemy = enemies[Math.floor(Math.random()*enemies.length)];
    let target = players[Math.floor(Math.random()*players.length)];

    // AI weaker multipliers
    let attackPower = enemy.troops * (Math.random()*0.3 + 0.8); // 0.8-1.1
    let defendPower = target.troops * (Math.random()*0.5 + 0.75); // 0.75-1.25

    let successChance = 0.4 + (attackPower - defendPower)/100; // base 40%
    successChance = Math.min(Math.max(successChance,0.1),0.8); // clamp 10%-80%

    addLog("💀 Enemy attacks your kingdom!");

    if(Math.random() < successChance){
        enemy.troops = Math.floor(enemy.troops*0.6);
        target.owner = "enemy";
        target.troops = Math.floor(enemy.troops*0.8);
        addLog("💀 Enemy conquered one of your kingdoms!");
    } else {
        enemy.troops = Math.floor(enemy.troops*0.5);
        addLog("🛡 Your kingdom held!");
    }

    drawMap();
    checkWin();
}

// Check if player or AI has won
function checkWin(){
    let playerCount=kingdoms.filter(k=>k.owner==="player").length;
    let enemyCount=kingdoms.filter(k=>k.owner==="enemy").length;

    if(enemyCount===0){
        alert("🏆 You conquered the world!");
    }
    if(playerCount===0){
        alert("💀 Your kingdom has fallen!");
    }
}

// Reset the game
function resetGame(){
    turn=1;
    selectedKingdoms=[];
    allianceRequests = 0;
    log.innerHTML="<h2>👑 Iron Crown</h2><h3>Battle Log</h3>";
    generateMap();
    drawMap();
    addLog("Game Reset. New world generated!");
}

// Add log messages
function addLog(text){
    log.innerHTML += text+"<br>";
    log.scrollTop=log.scrollHeight;
}

// Update turn info text
function updateTurnInfo(){
    turnInfo.innerText = "Turn: "+turn+" | Alliances used: "+allianceRequests+"/2";
}

// Initialize game
generateMap();
drawMap();
updateTurnInfo();
</script>

</body>
</html>
