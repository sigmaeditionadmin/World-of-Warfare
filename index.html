<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aircraft Simulator - Cockpit View</title>
<style>
  body { margin: 0; overflow: hidden; background: #87CEEB; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: monospace;
    background: rgba(0,0,0,0.3);
    padding: 8px;
    border-radius: 5px;
  }
</style>
</head>
<body>
<div id="hud">Speed: 0 | Altitude: 0</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script>

let scene, camera, renderer;
let plane, planeVelocity = 0;
let planePitch = 0, planeRoll = 0;
let keys = {};
let clock = new THREE.Clock();

init();
animate();

function init() {
  // Scene
  scene = new THREE.Scene();

  // Camera (cockpit view)
  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

  // Renderer
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);
  const directional = new THREE.DirectionalLight(0xffffff, 0.6);
  directional.position.set(5, 10, 7);
  scene.add(directional);

  // Plane (placeholder)
  const geometry = new THREE.ConeGeometry(0.5, 2, 16);
  const material = new THREE.MeshStandardMaterial({color: 0xff0000});
  plane = new THREE.Mesh(geometry, material);
  plane.rotation.x = Math.PI/2; // point forward
  scene.add(plane);

  // Ground
  const groundGeo = new THREE.PlaneGeometry(500, 500, 10, 10);
  const groundMat = new THREE.MeshStandardMaterial({color: 0x228B22});
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // Skybox (simple color for now)
  scene.background = new THREE.Color(0x87CEEB);

  // Window resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Keyboard
  window.addEventListener('keydown', (e) => { keys[e.code] = true; });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; });
}

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  handleControls(delta);
  updateCamera();
  updateHUD();

  renderer.render(scene, camera);
}

function handleControls(delta) {
  const throttleSpeed = 20;
  const pitchSpeed = Math.PI; // rad/s
  const rollSpeed = Math.PI; // rad/s

  // Throttle
  if(keys['KeyW']) planeVelocity += throttleSpeed * delta;
  if(keys['KeyS']) planeVelocity -= throttleSpeed * delta;
  planeVelocity = Math.max(0, planeVelocity);

  // Pitch
  if(keys['ArrowUp']) planePitch += pitchSpeed * delta;
  if(keys['ArrowDown']) planePitch -= pitchSpeed * delta;

  // Roll
  if(keys['KeyA']) planeRoll += rollSpeed * delta;
  if(keys['KeyD']) planeRoll -= rollSpeed * delta;

  // Apply rotation
  plane.rotation.z = planeRoll;
  plane.rotation.x = Math.PI/2 + planePitch;

  // Move forward along local plane direction
  const forward = new THREE.Vector3(0, 0, -1);
  forward.applyEuler(plane.rotation);
  plane.position.add(forward.multiplyScalar(planeVelocity * delta));
}

function updateCamera() {
  // Cockpit camera: slightly behind nose
  const offset = new THREE.Vector3(0, 0.2, 0.5);
  offset.applyEuler(plane.rotation);
  camera.position.copy(plane.position).add(offset);

  // Look forward along plane
  const lookAt = new THREE.Vector3(0, 0, -10);
  lookAt.applyEuler(plane.rotation);
  lookAt.add(plane.position);
  camera.lookAt(lookAt);
}

function updateHUD() {
  const hud = document.getElementById('hud');
  hud.innerText = `Speed: ${planeVelocity.toFixed(1)} | Altitude: ${plane.position.y.toFixed(1)}`;
}

</script>
</body>
</html>
